<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <p>Paste your long URL and get a short, shareable link instantly.</p>

    <div class="input-box">
      <input type="text" placeholder="Enter your long URL here" id="url"/>
      <button id="urlbutton">Shorten URL</button>
    </div>

    <div class="result-box">
      <h3>Shortened URL</h3>
      <div class="result-link">
        <a href="#" id="result">https://short.ly/abc123</a>
        <button class="copy-btn" id="copybutton">Copy</button>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
