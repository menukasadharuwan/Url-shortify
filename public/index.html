<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🔗 Shortify</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Make Your Links Short & Clean 🚀</h1>
    <p>Fast, simple, and powerful URL shortener for everyone.</p>
  </section>

  <!-- MAIN CONTAINER -->
  <div class="container">
    <h2>URL Shortener</h2>
    <p>Paste your long URL and get a short, shareable link instantly.</p>

    <div class="input-box">
      <input type="text" placeholder="Enter your long URL here" id="url"/>
      <button id="urlbutton">Shorten URL</button>
    </div>
    
    <div class="result-box">
      <h3>Shortened URL</h3>
      <div class="result-link">
        <a href="#" id="result">https://short.ly/abc123</a>
        <button class="copy-btn" id="copybutton">Copy</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 Shortify | Made By KMS </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
